# You already have the economic toolkit

In Weeks 1-7, you learned to analyze environmental problems. 

Climate change uses **all** of these tools — but pushes them to their limits.

--

| What you already know | What climate change adds |
|---|---|
| Externalities cause market failure (Week 2) | The externality is **global** — no single government controls it |
| Policy instruments fix externalities (Week 3) | These work **within** a country, but who sets a global carbon tax? |
| We can value non-market goods (Week 5) | The Social Cost of Carbon — but how do we discount future generations? |
| Forests store carbon (Week 6) | Carbon sinks are part of mitigation, but are they enough? |
| Free-rider problem and underprovision (Week 2) | The **same logic** explains why countries struggle to cooperate |

--

.content-box-yellow[
**The big question:** Why can't we just apply the solutions from Week 3 to climate change? What else do we need?
]

---

- Higher mortality impacts
- Larger economic losses
- Less capacity to adapt

# From Damage Estimates to the Social Cost of Carbon

How do we go from research evidence to a number we can use for policy?

---

# How do we know the damages we just saw?

Think back to Week 4 — **how do researchers estimate causal effects?**

--

The studies we just reviewed use exactly those methods:

| Study | What they estimate | Method |
|---|---|---|
| Carleton et al. (2022) | Temperature → mortality | Panel data across 40 countries |
| Burke et al. (2015) | Temperature → GDP per capita | Panel data across 166 countries |

--

These studies estimate a **damage function**: the relationship between temperature and a specific outcome.

--

.content-box-yellow[
**But here's the challenge:** These are damages along *individual dimensions*. 

Climate change affects mortality, agriculture, labor productivity, sea levels, conflict, migration, ecosystems... 

How do we add all of this up?
]

---

# The aggregation problem

To design policy, we need **one number**: the total marginal damage of one more ton of CO₂.

--

But damages span many dimensions, many countries, and many future time periods.

--

Remember from Week 3: to set the optimal Pigouvian tax, we need **MD**.

--


.content-box-green[
**This is what the Social Cost of Carbon (SCC) tries to do** — aggregate all climate damages into a single marginal damage estimate.
]


---

# What is the Social Cost of Carbon?

&lt;div style="text-align: center;"&gt;
&lt;iframe width="800" height="450" src="https://www.youtube.com/embed/nDuDUPfJLU0?si=1TWlr6_dfUVbi8SW" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen&gt;&lt;/iframe&gt;
&lt;/div&gt;

.center[[Read More at RFF Website](https://www.rff.org/publications/explainers/social-cost-carbon-101/)]

---

# What is the Social Cost of Carbon?

**Definition:** The monetary value of **total** damages caused by emitting one additional ton of CO₂

--

- Recall in Week 5, we learned to value non-market goods — clean air, biodiversity, health. 
  - The SCC does the same thing, but at a global scale. 
  - It aggregates damage functions like the ones we just reviewed (mortality, GDP) with many others to estimate the total marginal damage.

--

- In Week 3, once we have the marginal damage, we have the **optimal Pigouvian tax**. The SCC tells us what the carbon tax *should* be.

--

**Current estimates:** [More at Harvard tracker on SCC legal/policy developments](https://eelp.law.harvard.edu/tracker/the-social-cost-of-carbon/)

- Obama: $36/ton CO₂ (Global damages, 3% discount rate)
- Trump I: ~$1-8/ton (Domestic-only damages, 3% and 7% discount rates)
- Academic estimates ([Rennert et al. 2022](https://www.nature.com/articles/s41586-022-05224-9)): ~$185/ton 
- Biden: $190/ton (Global damages, 2% discount rate)
- Trump II: Moving to eliminate SCC 

---

# How is the SCC calculated?


**Four steps (connecting everything together):**

1. **Emissions scenarios:** Project future GHG emissions based on population, economic growth, and other factors.

2. **Climate modeling:** Translate emissions into future climate responses, such as temperature increase and sea level rise.

3. **Damage functions:** This is where studies like Carleton et al. and Burke et al. come in. 

- Estimate how climate changes affect *economic and social outcomes* — health, agriculture, energy use, coastal infrastructure, and more. 

- **This is the hardest step** because we don't yet have good damage estimates for many dimensions, especially in developing countries.

4. **Discounting:** Convert future damages into their present-day values and add them up to determine total damages.



--



.content-box-yellow[
**Key debates:** How much should we discount future damages? How do we value lives in poor vs. rich countries? And what about damages we can't yet measure?
]

---

# The SCC and policy


**If we know the SCC, we know the optimal carbon tax** 

--

| SCC estimate | Implied carbon tax |
|--------------|-------------------|
| $51/ton | $51/ton CO₂ |
| $185/ton | $185/ton CO₂ |

--

**Current carbon prices:**

- EU ETS: ~€80-90/ton (~$85-95)
- Most countries: $0 (no carbon price)

--

.content-box-green[
**Most carbon prices are too low** relative to academic SCC estimates. Why?
]

# Part II: Domestic Responses

What can individual countries do?

---

# Mitigation vs. adaptation: A framework


**Mitigation** — reduce the cause:

- Carbon pricing (Week 3 tools applied to climate)
- Renewable energy transition (costs have dropped dramatically — see IPCC 2022)
- Protecting forests and carbon sinks (Week 6)

--

**Adaptation** — reduce the consequences:

- Infrastructure, early warning systems, behavioral changes
- Case studies coming up: disaster funds, health systems, AC, LED

--

&lt;br&gt;

.content-box-yellow[
**The current trajectory suggests we will need both substantial mitigation AND adaptation.**
]

---

# How do mitigation and adaptation relate?


**Complements:**

- Optimal policy contains **both**
- Neither alone is sufficient

--

**Substitutes:**

- More of one means less is needed of the other
- If we mitigate more → less warming → less adaptation needed
- If we adapt better → damages lower → less urgency to mitigate

--

&lt;br&gt;

Let's look at each in turn — starting with mitigation through carbon pricing.

---

# Carbon Pricing

Building on Week 3: Applying policy instruments to climate change

---

# Carbon pricing: Applying Week 3 to climate

You already know the mechanics:

| Approach | How it works |
|----------|--------------|
| **Carbon tax** | Government sets price, market determines quantity |
| **Cap-and-trade** | Government sets quantity (cap), market determines price |

--

&lt;br&gt;

**Both create incentives to reduce emissions** by making firms internalize the externality.

--

&lt;br&gt;

**The question for climate change is not *whether* these tools work**

--

**The question is:** Can they work at the scale and speed needed for climate change?

---

# Why is carbon pricing hard politically?


**Costs are visible and immediate:**

- Higher energy prices
- Concerns about competitiveness
- Impacts on low-income households

--

**Benefits are diffuse and long-term:**

- Climate benefits accrue globally
- Future generations benefit most

--

**Political economy:**

- Concentrated losers (fossil fuel industry) vs. diffuse winners
- "Yellow vest" protests in France (fuel tax increase)

--

.content-box-green[
**Solutions:** Revenue recycling, border carbon adjustments, gradual phase-in
]

---

# So carbon pricing alone won't be enough

--

**Even where carbon pricing exists, prices are too low.**

--

**And some damages are already happening** — we also need to help people and countries cope with the consequences.

--

&lt;br&gt;

.content-box-green[
**This is why adaptation matters** — especially for developing countries that bear the most damages but have the least capacity to mitigate.
]

# Adaptation

How Countries Respond to Climate Impacts

---

# Forms of adaptation



**Large-scale infrastructure:**

- Sea walls for coastal protection
- Improved drainage systems
- Climate-resilient buildings

--

**Systems and services:**

- Early warning systems for disasters
- Heat action plans
- Climate-smart agriculture

--

**Behavioral changes:**

- Farmers plant different crops
- Households conserve water
- Migration to less vulnerable areas

---

# Example: Sea walls in Indonesia

&lt;div style="text-align: center;"&gt;
&lt;img src="figures/indo_seawall.png" style="width: 55%;" /&gt;
&lt;/div&gt;

--

**Question:** What climate change adaptation strategies have been adopted in your country?

---

# Constraints to private adaptation


**Will private agents adapt on their own?**

--


**Barriers to private adaptation:**

| Barrier | Example |
|---------|---------|
| **Property rights** | Renters don't invest in flood-proofing |
| **Information gaps** | People don't know their climate risks |
| **Affordability** | Poor households can't afford adaptation investments |
| **Credit constraints** | Can't borrow for upfront adaptation costs |
| **Public infrastructure** | Private adaptation depends on public roads, grids |

---

# Role for government


**1. Correct market failures:**

- Address distorted incentives that lead to under-adaptation

--

**2. Provide information:**

- Climate risk data is a public good

--

**3. Financial support:**

- Help populations facing affordability constraints

--

**4. Public infrastructure:**

- Develop adaptation plans for transportation, water systems, etc.

--


.content-box-green[
**Let's look at evidence on specific adaptation strategies.**
]

# Case Study 1: Indexed Disaster Funds in Mexico

del Valle (2024)

---

# The disaster aid problem

&lt;br&gt;

**In the last century:**

- 10,514 recorded storms, floods, and water-related disasters
- 8.3 million deaths directly attributed to disasters

--

**Deaths are skewed toward developing countries:**

- Not because disasters occur more there
- But because of **bottlenecks in disaster aid delivery**

--

&lt;br&gt;

**Bottlenecks:**

- Reliance on post-disaster financing (slow)
- Lack of rules and administrative capacity
- Delays in restoring critical services

---

# Mexico's FONDEN: An indexed disaster fund

&lt;br&gt;

**What is FONDEN?**

- Insures public infrastructure and low-income housing against disasters
- Overcomes bottlenecks through structured response

--

&lt;br&gt;

**Key features:**

| Feature | How it works |
|---------|--------------|
| **Pre-disaster funding** | Protected budget, reinsurance, catastrophe bonds |
| **Rules-based disbursement** | Automatic triggers (e.g., rainfall threshold) |
| **Structured process** | Verify disaster → assess damage → pay → audit |

---

# FONDEN: Eligibility threshold

&lt;div style="text-align: center;"&gt;
&lt;img src="figures/mexico1.png" style="width: 65%;" /&gt;
&lt;/div&gt;

--

Likelihood of receiving FONDEN increases from **0.65 just below** threshold to **0.87 just above**.

---

# FONDEN reduces disaster mortality

&lt;div style="text-align: center;"&gt;
&lt;img src="figures/mexico2.png" style="width: 65%;" /&gt;
&lt;/div&gt;

--

FONDEN decreases **0.82 excess deaths per 1,000 person-years** relative to ineligible municipalities.

---

# FONDEN: Key takeaways

&lt;br&gt;

**1. Pre-arranged disaster financing saves lives**

- Speed matters in disaster response
- Rules-based systems reduce delays

--

**2. Index-based triggers work**

- Automatic disbursement based on measurable thresholds
- Reduces political discretion and corruption

--

&lt;br&gt;

.content-box-green[
**Policy lesson:** Investing in disaster preparedness systems is cost-effective adaptation.
]

# Case Study 2: Public Health and Heat Mortality

Cohen (2022)

---

# Temperature kills — even at moderate levels

&lt;br&gt;

**Cohen (2022) findings:**

- Temperature variation causes ~**26,000 deaths/year** in Mexico
- This is **3.8% of annual deaths**

--

&lt;br&gt;

**Surprising finding:**

| Temperature | Deaths/year |
|-------------|-------------|
| Extremely hot (&gt;32°C) | ~500 |
| Unusually cold (&lt;12°C) | ~5,700 |
| Mildly cold (12-20°C) | **~18,500** (71%) |

--

**Most weather-related deaths come from mildly cold days** — not extreme events.

---

# Income protects against temperature

&lt;div style="text-align: center;"&gt;
&lt;img src="figures/mexico4.png" style="width: 55%;" /&gt;
&lt;/div&gt;

--

**Low-income groups are most vulnerable** to cold weather mortality.

---

# Can public policy reduce vulnerability?

&lt;br&gt;

**The Seguro Popular program:**

- Launched 2004 to increase universal healthcare
- Targeted people without employment-based insurance
- Focused on low-income, informal sector workers

--

&lt;br&gt;

**Context:**

- Before 2004: ~60% of population had no health insurance
- Major providers (IMSS, ISSSTE) linked to formal employment

---

# Seguro Popular reduces cold weather mortality

&lt;div style="text-align: center;"&gt;
&lt;img src="figures/mexico5.png" style="width: 55%;" /&gt;
&lt;/div&gt;

--

Estimated that Seguro Popular saves at least **1,600 lives per year** since 2004.

---

# Public health as adaptation: Key takeaways

&lt;br&gt;

**1. Climate vulnerability is shaped by institutions**

- Health insurance reduces mortality from temperature exposure
- Poor health systems amplify climate damages

--

**2. Adaptation doesn't always mean climate-specific policies**

- General improvements in health, income, infrastructure help
- "Development as adaptation"

--

&lt;br&gt;

.content-box-green[
**Policy lesson:** Strengthening health systems is climate adaptation.
]

# Can Adaptation and Mitigation Work Together?

---

# LED lighting in India: A win-win

&lt;div style="text-align: center;"&gt;

# LED lighting offsets temperature impacts

.pull-left[
&lt;div style="text-align: center;"&gt;
&lt;img src="figures/adaptation_LED.png" style="width: 100%;" /&gt;
&lt;/div&gt;
.small[.center[Source: Adhvaryu et al. (2021)]]
]

.pull-right[
**Setting:** Garment plants in India

**With fluorescent lamps:**
- At wet-bulb temperatures &gt;19°C, 1°C increase → **2.1% reduction** in efficiency

**With LED lighting:**
- Temperature impacts reduced by **~85%**

**LED lights:**
- Use less energy (mitigation)
- Produce less heat (adaptation)
]

---

# The LED example: Key insight

&lt;br&gt;

**Adaptation and mitigation can complement each other.**

--

| Technology | Adaptation benefit | Mitigation benefit |
|------------|-------------------|-------------------|
| LED lighting | Less indoor heat | Less energy use |
| Efficient AC | Better cooling | Lower emissions |
| Green buildings | Better thermal comfort | Lower energy demand |
| Urban green space | Cooling effect | Carbon sequestration |

--

&lt;br&gt;

.content-box-green[
**Best solutions address both adaptation and mitigation.**
]

---

# Part II summary: What can individual countries do?

--

**Carbon pricing works** — but prices are mostly too low (SCC tells us the right price)

--

**Adaptation takes many forms** — and doesn't always require climate-specific policies

--

**Key evidence from case studies:**

- Indexed disaster funds save lives (Mexico FONDEN)
- Health systems reduce climate vulnerability (Seguro Popular)
- Private adaptation (AC) works but has energy tradeoffs
- Some technologies address both adaptation and mitigation (LED)

--

&lt;br&gt;

.content-box-yellow[
**But here's the problem:** If each country acts only domestically, is it enough? 

And who pays for the damages that poor countries didn't cause?
]

---

class: inverse, middle, center

# Part III: The Global Challenge

Why domestic action alone is not enough

&lt;!-- ============================================== --&gt;
&lt;!-- SUGGESTED SESSION BREAK                        --&gt;
&lt;!-- Consider splitting here for two-week delivery  --&gt;
&lt;!-- Session 1: Parts I and II (above)              --&gt;
&lt;!-- Session 2: Part III (below) + group activity   --&gt;
&lt;!-- ============================================== --&gt;

---

# From the garden to the atmosphere

Remember the **shared garden** from Week 2?

--

| Shared garden (Week 2) | Global climate |
|---|---|
| Two neighbors share a garden | ~200 countries share an atmosphere |
| Both benefit, neither wants to pay | All benefit from emission reductions, none wants to bear the cost |
| Free-rider problem → underprovision | Free-rider problem → insufficient mitigation |
| **Solution:** Government can make both pay | **Problem:** There is no world government |

--


In Week 2, we said the government can solve the public goods problem by taxing or regulating. 

But for climate change, there is **no authority above sovereign nations** that can impose a global carbon tax.

--

.content-box-yellow[
**This is why climate change requires international cooperation** — and why it's so hard to achieve.
]

---

# Why domestic policy instruments are not enough

**Recall.** A carbon tax or cap-and-trade system works when:

--

1. One government has **authority** over the polluters ✅ (domestic) / ❌ (global)

2. The government can **monitor and enforce** compliance ✅ (domestic) / ❌ (global)

3. The **costs and benefits** of the policy fall within the same country ✅ (domestic) / ❌ (global)

--


**For climate change, point 3 is the core problem:**

- Korea imposes a carbon tax → Korean firms pay the cost
- But the benefit (less warming) is shared by all 200 countries
- **Local costs, global benefits** → weak incentive to act alone

--

**Carbon leakage:** Firms may simply move production to countries without carbon prices

--

.content-box-green[
**Domestic policy is necessary but not sufficient.** We also need mechanisms for international cooperation.
]

---

# One response to carbon leakage: The EU's CBAM

**The problem:** If the EU prices carbon but others don't, firms move production abroad → carbon leakage

--

**The EU's solution: Carbon Border Adjustment Mechanism (2026)**

- Importers must pay a carbon price on goods entering the EU
- Matches the EU ETS price — so foreign producers face the same cost
- Covers steel, cement, aluminum, fertilizers, electricity

--

**Why this matters:**

- It's a **domestic** policy instrument with **international** reach
- Uses trade leverage to extend carbon pricing beyond borders
- Doesn't require all countries to agree — just one large market

--

.content-box-yellow[
**But it raises equity concerns:** 
EU importers pay — but exporters in developing countries may lose market access if they lack carbon pricing. 

Is this climate policy or trade protectionism?
]


---

# Climate justice: Why this is also an equity problem

**The inequality:**

- The wealthiest 10% of people produce **40% of emissions**
- Developing countries contribute less but suffer more

--

&lt;br&gt;

**Financial gap:**

- Climate finance is **3-6 times lower** than required to meet goals
- Developing nations face greater challenges due to limited resources

--

&lt;br&gt;

.content-box-yellow[
**This asymmetry shapes international negotiations:** Poor countries demand support from rich countries. Rich countries resist binding commitments.
]

---

class: inverse, middle, center

# International Climate Negotiations

Can countries cooperate on a global public good?

---

# In-Class Game: Climate Negotiation

**Setup:** 6 groups of 4, each representing a country. You start with **100 points**.

Each round, choose secretly: **Cooperate** (invest in mitigation, costs 20 pts) or **Defect** (do nothing).

- If **4+ groups** cooperate → climate damages avoided
- If **fewer than 4** cooperate → **everyone loses 30 pts** (climate damages)

--

| Round | Rules |
|-------|-------|
| **Round 1** | No communication. Choose and reveal. |
| **Round 2** | 2 min negotiation, then choose secretly. **Reveal.** |
| **Round 3** | Negotiate + **binding side payments**. Choose. **Reveal.** |

--

&lt;br&gt;

.content-box-green[
**After Round 3:** Which group has the most points? What happened across rounds?
]

---

# The collective action problem

**Why is climate cooperation so hard?** The same logic from Week 2, but scaled up:

--

**1. Free-rider problem:**

- Emission reductions are a **global public good** (non-rival, non-excludable)
- Countries benefit from others' reductions without reducing their own

--

**2. Asymmetric costs and benefits:**

- Rich countries caused the problem but bear lower damages
- Poor countries bear higher damages but can't afford mitigation
- This is different from the garden game — the neighbors are not equal

--

**3. No enforcement mechanism:**

- In domestic policy, the government enforces the tax
- Internationally, agreements are largely **voluntary**

--


.content-box-yellow[
**Climate change is a classic collective action problem.**
]

---

# Game theory and climate negotiations

&lt;br&gt;

**Climate negotiations involve:**

- Multiple countries with diverse interests
- Balancing economic growth and emissions reduction
- Repeated interactions over time

--

&lt;br&gt;

**Game theory helps explain:**

- Why countries might not cooperate
- How cooperation can emerge
- What agreement designs work better

--

&lt;br&gt;

.small[Video: What is game theory? https://www.youtube.com/watch?v=mScpHTIi-kM]


---

# The "Climate Dilemma" — A simple game

**Two countries choose: Cooperate (reduce emissions) or Defect (do nothing)**

&lt;br&gt;

&lt;table style="width: 70%; margin: 20px auto; border-collapse: collapse; text-align: center;"&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th style="border: 1px solid #ddd; padding: 10px;"&gt;&lt;/th&gt;
&lt;th style="border: 1px solid #ddd; padding: 10px;"&gt;Country B: Cooperate&lt;/th&gt;
&lt;th style="border: 1px solid #ddd; padding: 10px;"&gt;Country B: Defect&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td style="border: 1px solid #ddd; padding: 10px;"&gt;&lt;strong&gt;Country A: Cooperate&lt;/strong&gt;&lt;/td&gt;
&lt;td style="border: 1px solid #ddd; padding: 10px; background: #c8e6c9;"&gt;Both benefit (climate mitigation)&lt;/td&gt;
&lt;td style="border: 1px solid #ddd; padding: 10px; background: #ffcdd2;"&gt;A bears cost, B free rides&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td style="border: 1px solid #ddd; padding: 10px;"&gt;&lt;strong&gt;Country A: Defect&lt;/strong&gt;&lt;/td&gt;
&lt;td style="border: 1px solid #ddd; padding: 10px; background: #ffcdd2;"&gt;B bears cost, A free rides&lt;/td&gt;
&lt;td style="border: 1px solid #ddd; padding: 10px; background: #ef9a9a;"&gt;Both lose (climate disaster)&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;

--

&lt;br&gt;

**Dominant strategy:** Defect (regardless of what the other does)

**Result:** Both defect → worst outcome for everyone

---

# Repeated games and cooperation


**In a one-time game:** Countries have incentive to defect

--

**But climate negotiations are repeated:**

- Countries meet regularly (COP every year)
- Trust and cooperation can develop
- Paris Agreement: Periodic reviews every 5 years

--

**Tit-for-tat strategy:**

- Cooperate if others cooperate
- Retaliate if others defect
- Can sustain cooperation in repeated games

--

&lt;br&gt;

.content-box-green[
**Repeated interactions + transparency + peer pressure can help sustain cooperation.**
]

# The precedent: Montreal Protocol

**Not all international environmental agreements fail!**

[Read about Montreal Protocol](https://www.sciencediplomacy.org/article/2020/learning-success-lessons-in-science-and-diplomacy-montreal-protocol) and discuss the following questions (10 mins):

1. What made the Montreal Protocol successful where climate agreements have struggled?

2. The article mentions "uncertainty acted as a catalyst for action" for ozone. Why hasn't uncertainty worked the same way for climate change?

3. What role did industry play? Could this be replicated for fossil fuels?

4. The Multilateral Fund helped developing countries transition. How does this compare to climate finance today?

5. What lessons from Montreal could realistically be applied to climate negotiations?


---

# The precedent: Montreal Protocol 

--

&lt;br&gt;

**Montreal Protocol (1987):**

- International treaty to reduce ozone-depleting substances
- Expanded to cover 96 harmful chemicals
- By 2008: Over 95% of substances eliminated
- Ozone layer expected to recover by 2075

--

&lt;br&gt;

**Why did it succeed?**

1. Inclusive approach for developing countries (longer deadlines)
2. Financial &amp; technical support (Multilateral Fund)
3. Industry innovation (companies could sell alternatives)

---

# Lessons from Montreal for climate?

&lt;br&gt;

| Montreal Protocol | Climate Change |
|-------------------|----------------|
| Few chemicals in few industries | CO₂ embedded in entire economy |
| Clear substitutes available | Requires systemic transformation |
| Limited economic disruption | Massive economic implications |
| ~$3 billion fund sufficient | Trillions needed |

--

&lt;br&gt;

.content-box-yellow[
**Climate change is a much harder problem** — but Montreal shows international cooperation *can* work.
]

---

# Two models of international cooperation

| | Montreal Protocol | EU CBAM |
|---|---|---|
| **Approach** | Multilateral agreement | Unilateral + trade leverage |
| **Who joins?** | All countries sign on | EU acts, others must comply to trade |
| **Incentive for developing countries** | Financial support (Multilateral Fund) | Avoid border tariffs |
| **Equity** | Built-in support for poorer countries | Critics call it "green protectionism" |

--

&lt;br&gt;

.content-box-green[
**Neither alone is sufficient.** 

Effective climate cooperation likely requires *both* multilateral agreements *and* trade-based mechanisms.
]


---

# Summary: What have we learned across Weeks 8-9?

--

**Part I — The Problem:**

- Climate change is the ultimate externality — global, long-term, unequal
- Damages fall disproportionately on poor countries
- The SCC provides the optimal carbon price (connecting Weeks 3 and 5)

--

**Part II — Domestic Responses:**

- Carbon pricing works but most prices are too low — political economy explains the gap
- Adaptation takes many forms — disaster funds, health systems, AC, LEDs
- Best solutions combine adaptation and mitigation

--

**Part III — The Global Challenge:**

- Domestic policy alone is insufficient (free-rider problem from Week 2, scaled up)
- Climate justice means this is also an equity problem between rich and poor countries
- International cooperation is hard — but possible (Montreal Protocol)

---

# Conclusion: The road ahead

&lt;br&gt;

**Climate change is a pressing challenge with unequal impacts.**

--

**It requires action at every level:**

- Domestic policy instruments
- International cooperation (new challenge — no world government)
- Technological innovation (clean energy, adaptation technologies)

--

**There is still limited evidence** on climate impacts and adaptation in LMICs.

--

&lt;br&gt;

.content-box-green[
**We will need to design and implement solutions.** 

Hope that the economics you've learned in this course provides tools for thinking about these challenges.
]
